<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bolão Copa 2026 — Tembici</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#009B54;--green-dark:#007A40;--green-light:#E6F5EE;
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E5E7EB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --radius-md:8px;--radius-lg:12px;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);min-height:100vh}
.page{max-width:1200px;margin:0 auto;padding:16px}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--border);gap:10px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:8px;min-width:0}
.ball{width:40px;height:40px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.upd{font-size:10px;color:var(--text3);text-align:right;line-height:1.4}
.upd strong{color:var(--text2);font-size:11px}

/* lang */
.lang{display:flex;border:1px solid var(--border);border-radius:18px;overflow:hidden}
.lbtn{font-size:10px;font-weight:600;padding:3px 10px;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s}
.lbtn.on{background:var(--green);color:#fff}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto;gap:0;padding:0 -8px}
.tb{padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s;flex-shrink:0}
.tb:hover{color:var(--text)}
.tb.on{color:var(--green);border-bottom-color:var(--green)}

/* sections */
.sec{display:none}.sec.on{display:block}

/* geral layout */
.geral-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.geral-grid{grid-template-columns:2fr 1fr;grid-template-areas:"main side"}}
.geral-main{grid-area:main}
.country-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.country-grid{grid-template-columns:1fr}}

/* card */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-height:0}
.card-hdr{padding:10px 12px 8px;border-bottom:0.5px solid var(--border)}
.card-icon{font-size:18px;margin-bottom:2px}
.card-icon .ti{font-size:18px;vertical-align:middle}
.card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.card-sub{font-size:10px;color:var(--text2);margin-top:1px}
.card-body{padding:0;overflow-y:auto;max-height:500px}

/* rows */
.row{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:0.5px solid var(--border);transition:background .1s;min-width:0}
.row:last-child{border-bottom:none}
.row:hover{background:var(--bg)}
.medal{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.rank-num{font-size:11px;font-weight:500;color:var(--text3);width:16px;text-align:center;flex-shrink:0}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.info{flex:1;min-width:0}
.pname{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.phandle{font-size:10px;color:var(--text3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:1px}
.pts{font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0}
.up{color:var(--green);font-size:11px;margin-left:2px;flex-shrink:0}
.dn{color:#EF4444;font-size:11px;margin-left:2px;flex-shrink:0}
.eq{color:var(--text3);font-size:10px;margin-left:2px;flex-shrink:0}

/* grids */
.praca-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
@media(min-width:768px){.praca-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
@media(min-width:768px){.dir-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}

/* accent */
.acc-br{border-top:3px solid #009B54}
.acc-ar{border-top:3px solid #74ACDF}
.acc-cl{border-top:3px solid #D52B1E}
.acc-co{border-top:3px solid #FCD116}
.acc-cbo{border-top:3px solid #7F77DD}
.acc-ctio{border-top:3px solid #1D9E75}
.acc-cfo{border-top:3px solid #D85A30}
.acc-ceo{border-top:3px solid #D4537E}
.acc-b2b{border-top:3px solid #BA7517}
.acc-relgov{border-top:3px solid #E24B4A}
.acc-corp{border-top:3px solid #7F77DD}
.acc-op{border-top:3px solid #D85A30}
.acc-praca{border-top:3px solid var(--green)}

/* enrollment tab */
.enr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.enr-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.enr-card-hdr{padding:10px 12px 8px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.enr-card-title{font-size:13px;font-weight:600;color:var(--text)}
.enr-badge{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge-num{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
.badge-in{background:#D1FAE5;color:#065F46}
.badge-out{background:#FEE2E2;color:#991B1B}
.enr-progress{height:4px;background:#E5E7EB;margin:0 12px 0}
.enr-progress-bar{height:4px;background:var(--green);border-radius:2px;transition:width .3s}
.enr-body{padding:0;max-height:320px;overflow-y:auto}
.enr-row{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:0.5px solid var(--border);min-width:0}
.enr-row:last-child{border-bottom:none}
.enr-row:hover{background:var(--bg)}
.enr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-in{background:#10B981}
.dot-out{background:#EF4444}
.enr-name{font-size:11px;color:var(--text);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.enr-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;flex-shrink:0}
.tag-in{background:#D1FAE5;color:#065F46}
.tag-out{background:#FEE2E2;color:#991B1B}
.enr-summary{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;flex-wrap:wrap}
.enr-sum-item{display:flex;flex-direction:column;align-items:center;min-width:60px}
.enr-sum-val{font-size:20px;font-weight:700;color:var(--text)}
.enr-sum-val.green{color:var(--green)}
.enr-sum-val.red{color:#EF4444}
.enr-sum-lbl{font-size:10px;color:var(--text2)}
.enr-filter{display:flex;gap:6px;flex-wrap:wrap;padding:0 0 10px}
.enr-fbtn{font-size:11px;padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);transition:all .15s}
.enr-fbtn.on{background:var(--green);color:#fff;border-color:var(--green)}

/* loading */
.loading{text-align:center;padding:40px 16px;color:var(--text2);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:30px 16px;color:#EF4444;font-size:13px}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-left">
      <div class="ball">⚽</div>
      <div style="min-width:0">
        <div class="hdr-title" id="ttl">Bolão Copa 2026</div>
        <div class="hdr-sub" id="sub">Tembici · Copa 2026™</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="lang">
        <button class="lbtn on" onclick="setL('pt')">PT</button>
        <button class="lbtn" onclick="setL('es')">ES</button>
      </div>
      <div class="upd">
        <strong id="upd-t">—</strong><br>
        <span id="upd-j"></span>
      </div>
    </div>
  </div>

  <div id="main-loading" class="loading">
    <div class="spinner"></div>
    <span id="loading-txt">Carregando ranking...</span>
  </div>
  <div id="main-err" class="err" style="display:none"></div>

  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tb on" onclick="showTab('geral',this)" id="tb0">🏆 Geral</button>
      <button class="tb" onclick="showTab('praca',this)" id="tb1">📍 Praças</button>
      <button class="tb" onclick="showTab('dir',this)" id="tb2">🏢 Diretoria</button>
      <button class="tb" onclick="showTab('corp',this)" id="tb3">⚙️ Corp vs Op</button>
      <button class="tb" onclick="showTab('enr',this)" id="tb4">📋 Inscrições</button>
      <button class="tb" onclick="showTab('erros',this)" id="tb5">⚠️ Erros</button>
    </div>

    <div id="sec-geral" class="sec on">
      <div class="geral-grid">
        <div class="geral-main" id="card-geral-wrap"></div>
        <div class="country-grid" id="country-cards"></div>
      </div>
    </div>

    <div id="sec-praca" class="sec">
      <div class="praca-grid" id="praca-cards"></div>
    </div>

    <div id="sec-dir" class="sec">
      <div class="dir-grid" id="dir-cards"></div>
    </div>

    <div id="sec-corp" class="sec">
      <div class="dir-grid" id="corp-cards"></div>
    </div>

    <div id="sec-enr" class="sec">
      <div id="enr-summary"></div>
      <div class="enr-filter" id="enr-filter"></div>
      <div class="enr-grid" id="enr-cards"></div>
    </div>

    <div id="sec-erros" class="sec">
      <div id="erros-wrap"></div>
    </div>
  </div>

</div>
<script>
const AB=["#E6F1FB","#E1F5EE","#FAECE7","#FAEEDA","#EEEDFE","#EAF3DE","#FBEAF0","#FFF8D6"];
const AF=["#185FA5","#0F6E56","#993C1D","#BA7517","#534AB7","#3B6D11","#993556","#7A6A00"];
const MEDALS=["🥇","🥈","🥉"];

const I18N={
  pt:{title:"Bolão Copa 2026",sub:"Tembici · Copa 2026™",loading:"Carregando...",err:"Erro ao carregar",
      t0:"🏆 Geral",t1:"📍 Praças",t2:"🏢 Diretoria",t3:"⚙️ Corp vs Op",t4:"📋 Inscrições",t5:"⚠️ Erros",
      geral:"Ranking Geral",top5:"Top 5",top3:"Top 3",jogos:"jogos",atualizado:"Atualizado",pts:"pts",part:"part.",
      corp:"Corporativo",op:"Operação",
      erros_title:"Handles sem match",erros_sub:"cadastrados no Dacopa mas não encontrados na base Excel",erros_none:"✅ Nenhum erro! Todos os handles têm match na base.",
      enr_title:"Status de Inscrição por Praça",enr_total:"na base",enr_in:"inscritos",enr_out:"pendentes",
      enr_all:"Todas",enr_only_out:"Só pendentes",tag_in:"inscrito",tag_out:"pendente"},
  es:{title:"Quiniela Copa 2026",sub:"Tembici · Copa 2026™",loading:"Cargando...",err:"Error al cargar",
      t0:"🏆 General",t1:"📍 Ciudades",t2:"🏢 Dirección",t3:"⚙️ Corp vs Op",t4:"📋 Inscripciones",t5:"⚠️ Errores",
      geral:"Clasificación General",top5:"Top 5",top3:"Top 3",jogos:"partidos",atualizado:"Actualizado",pts:"pts",part:"part.",
      corp:"Corporativo",op:"Operaciones",
      erros_title:"Handles sin match",erros_sub:"registrados en Dacopa pero no encontrados en la base Excel",erros_none:"✅ ¡Sin errores! Todos los handles tienen match en la base.",
      enr_title:"Estado de Inscripción por Ciudad",enr_total:"en la base",enr_in:"inscritos",enr_out:"pendientes",
      enr_all:"Todos",enr_only_out:"Solo pendientes",tag_in:"inscrito",tag_out:"pendiente"}
};

const COUNTRY_META={
  "Brasil":   {flag:"🇧🇷",acc:"acc-br"},
  "Argentina":{flag:"🇦🇷",acc:"acc-ar"},
  "Chile":    {flag:"🇨🇱",acc:"acc-cl"},
  "Colômbia": {flag:"🇨🇴",acc:"acc-co"},
};

const DIR_META={
  "CBO":    {icon:"ti-users",     acc:"acc-cbo",   color:"#534AB7"},
  "CTIO":   {icon:"ti-cpu",       acc:"acc-ctio",  color:"#0F6E56"},
  "CFO":    {icon:"ti-coin",      acc:"acc-cfo",   color:"#993C1D"},
  "CEO":    {icon:"ti-crown",     acc:"acc-ceo",   color:"#993556"},
  "B2B":    {icon:"ti-building-store",acc:"acc-b2b",color:"#854F0B"},
  "RELGOV": {icon:"ti-gavel",     acc:"acc-relgov",color:"#A32D2D"},
  "Outros": {icon:"ti-dots",      acc:"",          color:"#888780"},
};

let LANG="pt", DATA=null;

function t(k){return(I18N[LANG]||I18N.pt)[k]||k;}
function ini(n){return(n||"?").split(/[\s.]+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function ac(i){return[AB[i%AB.length],AF[i%AF.length]];}

function trend(cur,prev){
  if(!prev||prev===0)return'<span class="eq">—</span>';
  if(cur<prev)return'<span class="up">↑</span>';
  if(cur>prev)return'<span class="dn">↓</span>';
  return'<span class="eq">—</span>';
}

function fmtT(iso){
  try{return new Date(iso).toLocaleString(LANG==="pt"?"pt-BR":"es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
  catch{return iso;}
}

function makeRow(p,i,large){
  const[bg,fg]=ac(i);
  const pos=i<3?`<span class="medal">${MEDALS[i]}</span>`:`<span class="rank-num">${i+1}</span>`;
  const avCls=large?"av":"av-sm";
  return`<div class="row">
    ${pos}
    <div class="${avCls}" style="background:${bg};color:${fg}">${ini(p.displayName)}</div>
    <div class="info">
      <div class="pname">${p.displayName||p.handle}</div>
      ${large?`<div class="phandle">${p.handle}</div>`:""}
    </div>
    <span class="pts">${p.totalPoints}</span>
    ${trend(p.rank,p.prevPosition)}
  </div>`;
}

function makeCard(title,sub,acc,iconHtml,players,topN,large){
  const sorted=[...players].sort((a,b)=>b.totalPoints-a.totalPoints).slice(0,topN);
  if(!sorted.length)return"";
  return`<div class="card ${acc}">
    <div class="card-hdr">
      <div class="card-icon">${iconHtml}</div>
      <div class="card-title">${title}</div>
      <div class="card-sub">${sub}</div>
    </div>
    <div class="card-body">${sorted.map((p,i)=>makeRow(p,i,large)).join("")}</div>
  </div>`;
}

function renderGeral(){
  const sorted=[...DATA.standings].sort((a,b)=>b.totalPoints-a.totalPoints);
  document.getElementById("card-geral-wrap").innerHTML=
    makeCard(t("geral"),t("top5"),"card acc-br","🏆",sorted,5,true);

  const countries=["Brasil","Argentina","Chile","Colômbia"];
  document.getElementById("country-cards").innerHTML=countries.map(c=>{
    const m=COUNTRY_META[c]||{flag:"🌎",acc:""};
    const players=DATA.standings.filter(p=>p.pais===c);
    if(!players.length)return"";
    return makeCard(c,t("top3"),m.acc,m.flag,players,3,false);
  }).join("");
}

function renderGrid(containerId,groupKey,metaFn,topN,large){
  const groups={};
  DATA.standings.forEach(p=>{
    const g=p[groupKey];
    if(!groups[g])groups[g]=[];
    groups[g].push(p);
  });
  document.getElementById(containerId).innerHTML=
    Object.keys(groups).sort().map(g=>{
      const{icon,acc,flag,color,label}=metaFn(g);
      const iconHtml=flag?flag:`<i class="ti ${icon}" style="font-size:18px;color:${color}" aria-hidden="true"></i>`;
      const cnt=groups[g].length;
      return makeCard(label||g,`${cnt} ${t("part")}`,acc,iconHtml,groups[g],topN,large);
    }).join("");
}

function renderAll(){
  document.getElementById("ttl").textContent=t("title");
  document.getElementById("sub").textContent=t("sub");
  document.getElementById("upd-t").textContent=fmtT(DATA.updatedAt);
  document.getElementById("upd-j").textContent=DATA.finishedMatchesCount+" "+t("jogos");
  document.getElementById("loading-txt").textContent=t("loading");
  ["tb0","tb1","tb2","tb3","tb4","tb5"].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el)el.textContent=t("t"+i);
  });

  renderGeral();

  renderGrid("praca-cards","praca",g=>({
    icon:"ti-map-pin",acc:"acc-praca",color:"var(--green)",flag:null
  }),3,false);

  renderGrid("dir-cards","diretoria",g=>{
    const m=DIR_META[g]||{icon:"ti-dots",acc:"",color:"#888"};
    return{icon:m.icon,acc:m.acc,color:m.color,flag:null};
  },3,false);

  renderGrid("corp-cards","adm_corp",g=>{
    const isOp=g==="Operação"||g==="Operaciones";
    const label=isOp?(LANG==="es"?t("op"):"Operação"):t("corp");
    return{
      icon:isOp?"ti-tool":"ti-building",
      acc:isOp?"acc-op":"acc-corp",
      color:isOp?"#D85A30":"#7F77DD",
      flag:null,
      label
    };
  },5,true);

  renderEnrollment();
  renderErros();
}

let ENR_FILTER="all"; // "all" | "pending"

function renderEnrollment(){
  const enrollment = DATA.enrollment || [];
  if(!enrollment.length){
    document.getElementById("enr-summary").innerHTML=`<div class="loading">Sem dados de inscrição no data.json</div>`;
    return;
  }

  const total = enrollment.length;
  const ins   = enrollment.filter(x=>x.inscrito).length;
  const out   = total - ins;
  const pct   = total ? Math.round(100*ins/total) : 0;

  // Summary bar
  document.getElementById("enr-summary").innerHTML=`
    <div class="enr-summary">
      <div class="enr-sum-item">
        <span class="enr-sum-val">${total}</span>
        <span class="enr-sum-lbl">${t("enr_total")}</span>
      </div>
      <div style="flex:1;min-width:80px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:11px;color:var(--text2)">${ins} ${t("enr_in")}</span>
          <span style="font-size:11px;font-weight:700;color:var(--green)">${pct}%</span>
        </div>
        <div style="height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden">
          <div style="height:6px;background:var(--green);border-radius:3px;width:${pct}%"></div>
        </div>
        <div style="margin-top:3px;font-size:10px;color:#EF4444">${out} ${t("enr_out")}</div>
      </div>
    </div>`;

  // Filter buttons
  document.getElementById("enr-filter").innerHTML=`
    <button class="enr-fbtn ${ENR_FILTER==="all"?"on":""}" onclick="setEnrFilter('all',this)">${t("enr_all")}</button>
    <button class="enr-fbtn ${ENR_FILTER==="pending"?"on":""}" onclick="setEnrFilter('pending',this)">${t("enr_only_out")}</button>`;

  // Group by praça
  const groups={};
  enrollment.forEach(p=>{
    if(ENR_FILTER==="pending" && p.inscrito) return;
    if(!groups[p.praca]) groups[p.praca]=[];
    groups[p.praca].push(p);
  });

  document.getElementById("enr-cards").innerHTML=
    Object.keys(groups).sort().map(praca=>{
      const all_in_praca = enrollment.filter(x=>x.praca===praca);
      const total_p = all_in_praca.length;
      const ins_p   = all_in_praca.filter(x=>x.inscrito).length;
      const out_p   = total_p - ins_p;
      const pct_p   = total_p ? Math.round(100*ins_p/total_p) : 0;
      const members = groups[praca]; // already filtered

      const rows = members.map(p=>`
        <div class="enr-row">
          <div class="enr-dot ${p.inscrito?"dot-in":"dot-out"}"></div>
          <span class="enr-name">${p.handle}</span>
          <span class="enr-tag ${p.inscrito?"tag-in":"tag-out"}">${t(p.inscrito?"tag_in":"tag_out")}</span>
        </div>`).join("");

      return`<div class="enr-card acc-praca">
        <div class="enr-card-hdr">
          <span class="enr-card-title">📍 ${praca}</span>
          <div class="enr-badge">
            <span class="badge-num badge-in">${ins_p} ✓</span>
            ${out_p>0?`<span class="badge-num badge-out">${out_p} ✗</span>`:""}
          </div>
        </div>
        <div style="padding:4px 12px 6px">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:10px;color:var(--text2)">${ins_p}/${total_p}</span>
            <span style="font-size:10px;font-weight:700;color:${pct_p===100?"var(--green)":"var(--text2)"}">${pct_p}%</span>
          </div>
          <div style="height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden">
            <div style="height:4px;background:var(--green);border-radius:2px;width:${pct_p}%"></div>
          </div>
        </div>
        <div class="enr-body">${rows||`<div style="padding:8px 12px;font-size:11px;color:var(--text3)">Todos inscritos ✓</div>`}</div>
      </div>`;
    }).join("");
}

window.setEnrFilter=function(f){
  ENR_FILTER=f;
  renderEnrollment();
};


window.showTab=function(id,btn){
  document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
  document.querySelectorAll(".tb").forEach(b=>b.classList.remove("on"));
  document.getElementById("sec-"+id).classList.add("on");
  btn.classList.add("on");
};

window.setL=function(l){
  LANG=l;
  document.querySelectorAll(".lbtn").forEach(b=>b.classList.remove("on"));
  event.target.classList.add("on");
  if(DATA)renderAll();
};

LANG=(navigator.language||"pt").toLowerCase().startsWith("es")?"es":"pt";
document.querySelectorAll(".lbtn").forEach((b,i)=>{
  b.classList.toggle("on",(i===0&&LANG==="pt")||(i===1&&LANG==="es"));
});

fetch("data.json?_="+Date.now())
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(data=>{
    DATA=data;
    document.getElementById("main-loading").style.display="none";
    document.getElementById("app").style.display="block";
    renderAll();
  })
  .catch(err=>{
    document.getElementById("main-loading").style.display="none";
    const el=document.getElementById("main-err");
    el.style.display="block";
    el.textContent=t("err")+": "+err.message;
  });
</script>
</body>
</html>
