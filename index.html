<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 — Tembici</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#009B54;--green-dark:#007A40;--green-light:#E6F5EE;
  --gold:#F5D020;--gold-bg:#FFF8D6;--silver:#C0C0C0;--bronze:#CD7F32;
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E5E7EB;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --radius:10px;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);min-height:100vh}
.page{max-width:960px;margin:0 auto;padding:24px 16px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:24px;height:24px}
.title{font-size:20px;font-weight:700;color:var(--text)}
.subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.updated{font-size:12px;color:var(--text3);text-align:right}
.updated strong{display:block;color:var(--text2)}
.lang-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.lang-btn{font-size:12px;font-weight:600;padding:4px 12px;border-radius:16px;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s}
.lang-btn.active{background:var(--green);color:#fff}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:24px;font-weight:700;color:var(--text)}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.section{display:none}.section.active{display:block}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin:8px 0 28px;height:180px}
.podium-place{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:160px}
.podium-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border:3px solid transparent}
.podium-name{font-size:13px;font-weight:600;color:var(--text);text-align:center;max-width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.podium-pts{font-size:12px;color:var(--text2)}
.podium-bar{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.p1 .podium-avatar{background:var(--gold-bg);color:#7A6A00;border-color:var(--gold)}
.p2 .podium-avatar{background:#F5F5F5;color:#555;border-color:var(--silver)}
.p3 .podium-avatar{background:#F8EEE3;color:#6B3A0F;border-color:var(--bronze)}
.p1 .podium-bar{background:var(--gold);height:120px;color:#7A6A00}
.p2 .podium-bar{background:var(--silver);height:90px;color:#444}
.p3 .podium-bar{background:var(--bronze);height:68px;color:#5A2E00}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);text-align:left}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:11px 12px;font-size:13px;vertical-align:middle}
.rank-cell{width:36px;text-align:center;font-size:13px;font-weight:600;color:var(--text2)}
.rank-1{color:#B8860B}.rank-2{color:#808080}.rank-3{color:#8B4513}
.player-cell{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.player-name{font-weight:500;color:var(--text)}
.player-handle{font-size:11px;color:var(--text2)}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--green-light);color:var(--green-dark);font-weight:500;white-space:nowrap}
.badge-dir{background:#EEF2FF;color:#3730A3}
.badge-corp{background:#FDF4FF;color:#7E22CE}
.badge-op{background:#FFF7ED;color:#C2410C}
.pts{font-weight:700;font-size:14px;text-align:right}
.trend{text-align:center;width:32px}
.up{color:var(--green)}.dn{color:#EF4444}.eq{color:var(--text3);font-size:12px}

.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--green);color:var(--green)}
.fbtn.active{background:var(--green);color:#fff;border-color:var(--green)}

.group-hdr{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:12px 0 6px}
.group-hdr:not(:first-child){padding-top:24px}
.group-hdr .dir-pill{display:inline-block;margin-left:6px;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:none;letter-spacing:0;vertical-align:middle}

.loading{text-align:center;padding:60px 0;color:var(--text2);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:40px;color:#EF4444;font-size:14px}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="1.5"/>
          <path d="M12 3C12 3 14 7 14 9C14 10.1 13.1 11 12 11C10.9 11 10 10.1 10 9C10 7 12 3 12 3Z" fill="white"/>
          <path d="M3.5 8.5L7 10L6 13H4L3.5 8.5Z" fill="white" opacity=".8"/>
          <path d="M20.5 8.5L17 10L18 13H20L20.5 8.5Z" fill="white" opacity=".8"/>
          <path d="M6 17L8 14L12 15L16 14L18 17L12 21L6 17Z" fill="white" opacity=".9"/>
        </svg>
      </div>
      <div>
        <div class="title" data-i18n="title">Bolão Copa 2026</div>
        <div class="subtitle" data-i18n="subtitle">Tembici · Copa do Mundo da FIFA 2026™</div>
      </div>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn" id="btn-pt" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
      </div>
      <div class="updated">
        <strong id="upd-time">—</strong>
        <span id="upd-jogos"></span>
      </div>
    </div>
  </div>

  <div id="main-loading" class="loading">
    <div class="spinner"></div>
    <span data-i18n="loading">Carregando ranking...</span>
  </div>
  <div id="main-error" class="error-msg" style="display:none"></div>

  <div id="app" style="display:none">
    <div class="metrics">
      <div class="metric"><div class="metric-label" data-i18n="m_participantes">Participantes</div><div class="metric-val" id="m-part">—</div></div>
      <div class="metric"><div class="metric-label" data-i18n="m_jogos">Jogos encerrados</div><div class="metric-val" id="m-jogos">—</div></div>
      <div class="metric"><div class="metric-label" data-i18n="m_pracas">Praças</div><div class="metric-val" id="m-pracas">—</div></div>
      <div class="metric"><div class="metric-label" data-i18n="m_paises">Países</div><div class="metric-val" id="m-paises">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('geral',this)" data-i18n="tab_geral">🏆 Geral</button>
      <button class="tab" onclick="showTab('praca',this)" data-i18n="tab_praca">📍 Por praça</button>
      <button class="tab" onclick="showTab('pais',this)" data-i18n="tab_pais">🌎 Por país</button>
      <button class="tab" onclick="showTab('diretoria',this)" data-i18n="tab_diretoria">🏢 Por diretoria</button>
      <button class="tab" onclick="showTab('area',this)" data-i18n="tab_area">⚙️ Corp vs Operações</button>
    </div>

    <div id="tab-geral" class="section active">
      <div class="podium" id="podium"></div>
      <div class="card">
        <table>
          <thead><tr>
            <th>#</th>
            <th data-i18n="col_participante">Participante</th>
            <th data-i18n="col_praca">Praça</th>
            <th style="text-align:right" data-i18n="col_pts">Pts</th>
            <th></th>
          </tr></thead>
          <tbody id="tbody-geral"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-praca" class="section">
      <div class="filter-row" id="filter-praca"></div>
      <div id="content-praca"></div>
    </div>

    <div id="tab-pais" class="section">
      <div class="filter-row" id="filter-pais"></div>
      <div id="content-pais"></div>
    </div>

    <div id="tab-diretoria" class="section">
      <div class="filter-row" id="filter-diretoria"></div>
      <div id="content-diretoria"></div>
    </div>

    <div id="tab-area" class="section">
      <div class="filter-row" id="filter-area"></div>
      <div id="content-area"></div>
    </div>
  </div>
</div>

<script>
const I18N = {
  pt:{
    title:"Bolão Copa 2026",subtitle:"Tembici · Copa do Mundo da FIFA 2026™",
    loading:"Carregando ranking...",error:"Erro ao carregar dados",
    m_participantes:"Participantes",m_jogos:"Jogos encerrados",m_pracas:"Praças",m_paises:"Países",
    tab_geral:"🏆 Geral",tab_praca:"📍 Por praça",tab_pais:"🌎 Por país",
    tab_diretoria:"🏢 Por diretoria",tab_area:"⚙️ Corp vs Operações",
    col_participante:"Participante",col_praca:"Praça",col_pts:"Pts",
    todos:"Todos",atualizado:"Atualizado em",jogos_enc:"jogos encerrados",
    sem_dados:"Nenhum participante encontrado.",pts_label:"pts",
    dir_label:"Diretoria",area_label:"Área",
  },
  es:{
    title:"Quiniela Copa 2026",subtitle:"Tembici · Copa Mundial de la FIFA 2026™",
    loading:"Cargando clasificación...",error:"Error al cargar los datos",
    m_participantes:"Participantes",m_jogos:"Partidos finalizados",m_pracas:"Ciudades",m_paises:"Países",
    tab_geral:"🏆 General",tab_praca:"📍 Por ciudad",tab_pais:"🌎 Por país",
    tab_diretoria:"🏢 Por dirección",tab_area:"⚙️ Corp vs Operaciones",
    col_participante:"Participante",col_praca:"Ciudad",col_pts:"Pts",
    todos:"Todos",atualizado:"Actualizado el",jogos_enc:"partidos finalizados",
    sem_dados:"No se encontraron participantes.",pts_label:"pts",
    dir_label:"Dirección",area_label:"Área",
  }
};

const DIR_COLORS = {
  "CBO":    ["#E6F5EE","#007A40"],
  "CTIO":   ["#EEF2FF","#3730A3"],
  "CFO":    ["#FFF7ED","#C2410C"],
  "CEO":    ["#FDF4FF","#7E22CE"],
  "B2B":    ["#FFF8D6","#7A6A00"],
  "RELGOV": ["#FEF2F2","#991B1B"],
  "Outros": ["#F3F4F6","#6B7280"],
};

const AREA_COLORS = {
  "Corporativo": ["#FDF4FF","#7E22CE"],
  "Operação":    ["#FFF7ED","#C2410C"],
  "Operaciones": ["#FFF7ED","#C2410C"],
  "Outros":      ["#F3F4F6","#6B7280"],
};

let LANG = "pt";
let DATA = null;

function detectLang(){
  const nav=(navigator.language||navigator.userLanguage||"pt").toLowerCase();
  return nav.startsWith("es")?"es":"pt";
}
function t(k){return(I18N[LANG]||I18N.pt)[k]||k;}

function applyTranslations(){
  document.documentElement.lang=LANG==="pt"?"pt-BR":"es";
  document.title=t("title")+" — Tembici";
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent=t(el.getAttribute("data-i18n"));
  });
  document.getElementById("btn-pt").classList.toggle("active",LANG==="pt");
  document.getElementById("btn-es").classList.toggle("active",LANG==="es");
  if(DATA){
    document.getElementById("upd-jogos").textContent=DATA.finishedMatchesCount+" "+t("jogos_enc");
    renderAll();
  }
}
window.setLang=function(lang){LANG=lang;applyTranslations();};

const AB=["#E6F1FB","#E1F5EE","#FAECE7","#FAEEDA","#EEEDFE","#EAF3DE","#FBEAF0","#F1EFE8"];
const AF=["#185FA5","#0F6E56","#993C1D","#BA7517","#534AB7","#3B6D11","#993556","#5F5E5A"];
function ini(n){return(n||"?").split(/[\s.]+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function ac(i){return[AB[i%AB.length],AF[i%AF.length]];}
function trend(cur,prev){
  if(!prev||prev===0)return'<span class="eq">—</span>';
  if(cur<prev)return'<span class="up">↑</span>';
  if(cur>prev)return'<span class="dn">↓</span>';
  return'<span class="eq">—</span>';
}
function fmtTime(iso){
  try{const d=new Date(iso);return d.toLocaleString(LANG==="pt"?"pt-BR":"es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
  catch{return iso;}
}

function buildPodium(sorted){
  const el=document.getElementById("podium");
  if(!sorted.length){el.innerHTML="";return;}
  const top3=[sorted[1]||null,sorted[0],sorted[2]||null];
  const cls=["p2","p1","p3"],labels=["2°","1°","3°"];
  el.innerHTML=top3.map((p,i)=>{
    if(!p)return'<div style="flex:1"></div>';
    const idx=sorted.indexOf(p);const[bg,fg]=ac(idx);
    return`<div class="podium-place ${cls[i]}">
      <div class="podium-avatar" style="background:${bg};color:${fg}">${ini(p.displayName)}</div>
      <div class="podium-name">${(p.displayName||p.handle).split(".")[0]}</div>
      <div class="podium-pts">${p.totalPoints} ${t("pts_label")}</div>
      <div class="podium-bar">${labels[i]}</div>
    </div>`;
  }).join("");
}

function playerRow(p,i,badgeHtml=""){
  const rank=i+1;const[bg,fg]=ac(i);
  const rc=rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"";
  return`<tr>
    <td class="rank-cell ${rc}">${rank}</td>
    <td><div class="player-cell">
      <div class="avatar" style="background:${bg};color:${fg}">${ini(p.displayName)}</div>
      <div><div class="player-name">${p.displayName||p.handle}</div>
      <div class="player-handle">${p.handle}</div></div>
    </div></td>
    <td>${badgeHtml}</td>
    <td class="pts">${p.totalPoints}</td>
    <td class="trend">${trend(p.rank,p.prevPosition)}</td>
  </tr>`;
}

function buildGeralRows(sorted){
  if(!sorted.length)return`<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:24px">${t("sem_dados")}</td></tr>`;
  return sorted.map((p,i)=>playerRow(p,i,`<span class="badge">${p.praca}</span>`)).join("");
}

function buildGrouped(standings,groupKey,containerId,filterVal,badgeFn){
  const container=document.getElementById(containerId);
  const filtered=filterVal?standings.filter(p=>p[groupKey]===filterVal):standings;
  const groups={};
  filtered.forEach(p=>{
    if(!groups[p[groupKey]])groups[p[groupKey]]=[];
    groups[p[groupKey]].push(p);
  });
  let html="";
  Object.keys(groups).sort().forEach(g=>{
    const sorted=[...groups[g]].sort((a,b)=>b.totalPoints-a.totalPoints);
    const pill=badgeFn?badgeFn(g):"";
    html+=`<div class="group-hdr">${g}${pill} <span style="font-weight:400;color:var(--text3)">(${sorted.length})</span></div>
    <div class="card"><table>
      <thead><tr><th>#</th><th>${t("col_participante")}</th><th style="text-align:right">${t("col_pts")}</th><th></th></tr></thead>
      <tbody>${sorted.map((p,i)=>playerRow(p,i,"")).join("")}</tbody>
    </table></div>`;
  });
  container.innerHTML=html||`<p style="color:var(--text2);padding:20px 0;font-size:14px">${t("sem_dados")}</p>`;
}

function dirPill(g){
  const[bg,fg]=DIR_COLORS[g]||["#F3F4F6","#6B7280"];
  return`<span class="dir-pill" style="background:${bg};color:${fg}">${g}</span>`;
}
function areaPill(g){
  const label=LANG==="es"&&g==="Operação"?"Operaciones":g;
  const[bg,fg]=AREA_COLORS[g]||["#F3F4F6","#6B7280"];
  return`<span class="dir-pill" style="background:${bg};color:${fg}">${label}</span>`;
}

function buildFilters(standings,key,containerId,fn,labelFn){
  const vals=[...new Set(standings.map(p=>p[key]))].sort();
  const el=document.getElementById(containerId);
  el.innerHTML=`<button class="fbtn active" onclick="applyFilter(this,'${containerId}',null,'${fn}')">${t("todos")}</button>`
    +vals.map(v=>{
      const lbl=labelFn?labelFn(v):v;
      return`<button class="fbtn" onclick="applyFilter(this,'${containerId}','${v}','${fn}')">${lbl}</button>`;
    }).join("");
}

window.applyFilter=function(btn,cid,val,fn){
  document.querySelectorAll(`#${cid} .fbtn`).forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(fn==="praca")     buildGrouped(DATA.standings,"praca","content-praca",val,null);
  if(fn==="pais")      buildGrouped(DATA.standings,"pais","content-pais",val,null);
  if(fn==="diretoria") buildGrouped(DATA.standings,"diretoria","content-diretoria",val,dirPill);
  if(fn==="area")      buildGrouped(DATA.standings,"adm_corp","content-area",val,areaPill);
};

window.showTab=function(tab,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
};

function renderAll(){
  const sorted=[...DATA.standings].sort((a,b)=>b.totalPoints-a.totalPoints);
  const pracas=new Set(DATA.standings.map(p=>p.praca));
  const paises=new Set(DATA.standings.map(p=>p.pais));

  document.getElementById("m-part").textContent=DATA.standings.length;
  document.getElementById("m-jogos").textContent=DATA.finishedMatchesCount;
  document.getElementById("m-pracas").textContent=pracas.size;
  document.getElementById("m-paises").textContent=paises.size;
  document.getElementById("upd-time").textContent=t("atualizado")+" "+fmtTime(DATA.updatedAt);
  document.getElementById("upd-jogos").textContent=DATA.finishedMatchesCount+" "+t("jogos_enc");

  buildPodium(sorted);
  document.getElementById("tbody-geral").innerHTML=buildGeralRows(sorted);

  buildFilters(DATA.standings,"praca","filter-praca","praca",null);
  buildFilters(DATA.standings,"pais","filter-pais","pais",null);
  buildFilters(DATA.standings,"diretoria","filter-diretoria","diretoria",null);
  buildFilters(DATA.standings,"adm_corp","filter-area","area",
    v=>LANG==="es"&&v==="Operação"?"Operaciones":v);

  buildGrouped(DATA.standings,"praca","content-praca",null,null);
  buildGrouped(DATA.standings,"pais","content-pais",null,null);
  buildGrouped(DATA.standings,"diretoria","content-diretoria",null,dirPill);
  buildGrouped(DATA.standings,"adm_corp","content-area",null,areaPill);

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent=t(el.getAttribute("data-i18n"));
  });
}

LANG=detectLang();
document.getElementById("btn-pt").classList.toggle("active",LANG==="pt");
document.getElementById("btn-es").classList.toggle("active",LANG==="es");
applyTranslations();

fetch("data.json?_="+Date.now())
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(data=>{
    DATA=data;
    document.getElementById("main-loading").style.display="none";
    document.getElementById("app").style.display="block";
    renderAll();
  })
  .catch(err=>{
    document.getElementById("main-loading").style.display="none";
    const el=document.getElementById("main-error");
    el.style.display="block";
    el.textContent=t("error")+": "+err.message;
  });
</script>
</body>
</html>
