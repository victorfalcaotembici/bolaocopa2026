name: Atualizar dados bolão

on:
  schedule:
    - cron: '0 * * * *'   # todo hora
  workflow_dispatch:        # botão manual no GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar dados do Dacopa
        env:
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: python fetch_dacopa.py

      - name: Commit data.json se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: atualiza ranking $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
